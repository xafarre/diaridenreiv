  Reiv Anvil te la bellesa encara neta d'un noble massa jove per haver apres a amagar del tot l'orgull. Porta els cabells rossos fins a la barbeta, una mirada gris blavosa i un abric gris de tall refinat, creuat per corretges de cuir, espasa i escut. La seva presencia barreja educacio, impuls i una elegancia que l'aventura comenca a esgarrapar.

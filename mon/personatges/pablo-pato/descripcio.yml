resum_web: >-
  Pablo Pato és un home baixet i grassonet, de cabell negre, ulleres rodones i gestos tan prudents que gairebé fan nosa. Sembla maldestre, sempre a punt de disculpar-se amb el món, però quan parla d'arrels, fulles, bàlsams i verins, la veu li troba una precisió inesperada. La seva saviesa ve de dits tacats de terra, no de vanitat.

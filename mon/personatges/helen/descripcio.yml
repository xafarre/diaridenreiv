  Helen O'Donell apareix com una aventurera noble de figura prima i gest contingut, embolcallada per una capa vermella que li dona presencia de llinatge fins i tot al port. Porta cabell ros fosc o castany clar recollit enrere, roba clara de viatge, corretges de cuir i una espasa a l'esquena. La seva elegancia sembla preparada per convertir-se en accio.

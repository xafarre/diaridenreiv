  - id: "alina-gat"
    nom: "Alina transformada en gat"
    tipus: "transformacio"
    descripcio_visual: "En forma de gat, Alina adopta l'aspecte d'un gat siberià de mida mitjana, d'uns 7 kg, amb el pèl gris platejat i blanc perla. Els ulls continuen sent d'un verd molt pàl·lid, gairebé glaçat, i tot el cos transmet agilitat, silenci i precisió."
    diferencies_respecte_base: "Redueix la seva presència humana a una forma felina clara i freda, conservant els ulls verds pàl·lids com a senyal d'identitat."
    prompt_visual: "Siberian cat, medium-sized, silver-gray and pearl-white fur, very pale green eyes, agile elegant body, cold northern presence."
    imatge_referencia: ""
  - id: "alina-mico"
    nom: "Alina transformada en mico"
    tipus: "transformacio"
    descripcio_visual: "En forma de mico, Alina sembla un ximpanzé de mida mitjana, d'uns 130 cm i 45 kg, amb pèl gris platejat i blanc perla. Té una constitució forta, però es mou amb una agilitat sorprenent. Tot i que no existeix cap raça de ximpanzé pròpia de Sibèria, aquesta forma sembla exactament això: l'encarnació d'un ximpanzé siberià."
    diferencies_respecte_base: "Transforma la seva feralitat de caçadora en força compacta, mans hàbils i moviment vertical, però manté la paleta freda de gris platejat i blanc perla."
    prompt_visual: "A Siberian-looking chimpanzee, medium-sized, 130 cm tall, 45 kg, silver-gray and pearl-white fur, strong compact build, very agile, pale northern aura."
    imatge_referencia: ""
  - id: "alina-sierpe-voladora"
    nom: "Alina transformada en sierpe voladora"
    tipus: "transformacio"
    descripcio_visual: "En forma de sierpe voladora, Alina és una serp d'aproximadament un metre de llarg. Des del cap fins al primer terç del cos s'estenen unes ales plegables: quan estan tancades semblen una protuberància llarga sobre el llom; quan s'obren, recorden ales de ratpenat, amb la base prop del cap i una membrana tensada fins a la punta d'aquesta extensió."
    diferencies_respecte_base: "La identitat visual passa de caçadora humana a criatura reptiliana i alada, pensada per lliscar, planar i aparèixer com una forma estranya però elegant."
    prompt_visual: "A flying serpent about one meter long, wings running from the head to the first third of the body, folded wings forming a long dorsal bulge, open bat-like membranes stretched from near the head to the wing tips, elegant strange creature."
    imatge_referencia: ""
notes_canon: "El canon textual i la portada coincideixen en cabell fosc, ulls verds, pells blanques i rol de caçadora; la portada afegeix marques facials clares. Les formes animals canon actuals són gat siberià, mico d'aparença siberiana i sierpe voladora."

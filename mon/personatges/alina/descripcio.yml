    nom: "Alina transformada en mico"
    tipus: "transformacio"
    descripcio_visual: "En forma de mico, Alina sembla un ximpanze de mida mitjana, d'uns 130 cm i 45 kg, amb pel gris platejat i blanc perla. Te una constitucio forta, pero es mou amb una agilitat sorprenent. Tot i que no existeix cap raça de ximpanze propia de Siberia, aquesta forma sembla exactament aixo: l'encarnacio d'un ximpanze siberia."
    diferencies_respecte_base: "Transforma la seva feralitat de caçadora en força compacta, mans habils i moviment vertical, pero mante la paleta freda de gris platejat i blanc perla."

  - id: "alina-sierpe-voladora"
    nom: "Alina transformada en sierpe voladora"
    tipus: "transformacio"
    descripcio_visual: "En forma de sierpe voladora, Alina es una serp d'aproximadament un metre de llarg. Des del cap fins al primer terç del cos s'estenen unes ales plegables: quan estan tancades semblen una protuberancia llarga sobre el llom; quan s'obren, recorden ales de ratpenat, amb la base prop del cap i una membrana tensada fins a la punta d'aquesta extensio."
    diferencies_respecte_base: "La identitat visual passa de caçadora humana a criatura reptiliana i alada, pensada per lliscar, planar i apareixer com una forma estranya pero elegant."

---
layout: default
---

{% capture image_prefix %}<img src="{{ page.dir | relative_url }}{% endcapture %}
{% capture image_prefix_single %}<img src='{{ page.dir | relative_url }}{% endcapture %}
{% assign acte_content = content | replace: '<img src="', image_prefix | replace: "<img src='", image_prefix_single %}

<article class="act standalone-act">
  <header class="act-heading">
    <p>{% if page.label %}{{ page.label }}{% else %}Acte {{ page.order }}{% endif %}</p>
    <h1>{{ page.title }}</h1>
  </header>
  {{ acte_content }}
</article>
